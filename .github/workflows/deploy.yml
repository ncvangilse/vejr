name: Build & Deploy
run-name: "[build ${{ github.run_number }}] ${{ github.event.head_commit.message }}"

on:
  push:
    branches: ['**']

permissions:
  contents: write

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'pages-main' || 'pages-dev' }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Generate build number
        id: build
        run: |
          BUILD=$(date -u '+%Y.%m.%d')-${{ github.run_number }}
          echo "number=$BUILD" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject build number
        run: |
          BUILD=${{ steps.build.outputs.number }}
          sed -i "s/%%BUILD_NUMBER%%/$BUILD/g" vejr.html
          sed -i "s/%%BUILD_NUMBER%%/$BUILD/g" sw.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          keep_files: true
          exclude_assets: '.github,tests,package.json,CLAUDE.md'

  deploy-dev:
    needs: test
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Generate build number
        id: build
        run: |
          BUILD=$(date -u '+%Y.%m.%d')-${{ github.run_number }}-dev
          echo "number=$BUILD" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject build number and dev manifest paths
        run: |
          BUILD=${{ steps.build.outputs.number }}
          sed -i "s/%%BUILD_NUMBER%%/$BUILD/g" vejr.html
          sed -i "s/%%BUILD_NUMBER%%/$BUILD/g" sw.js
          sed -i 's|/vejr/|/vejr/dev/|g' manifest.json

      - name: Deploy to GitHub Pages (dev)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: dev
          keep_files: true
          exclude_assets: '.github,tests,package.json,CLAUDE.md'
