name: Build & Deploy (Test)
run-name: "[build ${{ github.run_number }}] ${{ github.event.head_commit.message }}"

on:
  push:
    branches-ignore: ['main']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-dev
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Generate build number
        id: build
        run: |
          BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          BUILD=$(date -u '+%Y.%m.%d')-${{ github.run_number }}-${BRANCH}
          echo "number=$BUILD" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject build number and dev manifest paths
        run: |
          BUILD=${{ steps.build.outputs.number }}
          sed -i "s/%%BUILD_NUMBER%%/$BUILD/g" vejr.html
          sed -i "s/%%BUILD_NUMBER%%/$BUILD/g" sw.js
          sed -i 's|/vejr/|/vejr/dev/|g' manifest.json

      - name: Fetch wind station data
        run: |
          curl -fsSL \
            "https://storage.googleapis.com/trafikkort-data/geojson/wind-speeds.point.json" \
            -o wind-speeds.json \
            || echo '{"type":"FeatureCollection","features":[]}' > wind-speeds.json

      - name: Fetch NinJo station data
        run: |
          NINJO_DIRECT='https://www.dmi.dk/NinJo2DmiDk/ninjo2dmidk?cmd=obj&south=54.1&north=57.9&west=5.5&east=17.9'
          NINJO_ENC='https%3A%2F%2Fwww.dmi.dk%2FNinJo2DmiDk%2Fninjo2dmidk%3Fcmd%3Dobj%26south%3D54.1%26north%3D57.9%26west%3D5.5%26east%3D17.9'
          curl -fsSL "$NINJO_DIRECT" -o ninjo-stations.json \
          || curl -fsSL "https://api.allorigins.win/raw?url=$NINJO_ENC" -o ninjo-stations.json \
          || curl -fsSL "https://corsproxy.io/?url=$NINJO_ENC"          -o ninjo-stations.json \
          || echo '{}' > ninjo-stations.json

      - name: Deploy to GitHub Pages (test)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: dev
          keep_files: true
          exclude_assets: '.github,tests,package.json,CLAUDE.md'
