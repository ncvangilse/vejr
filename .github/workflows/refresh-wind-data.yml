name: Refresh wind station data

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes (best-effort; GH scheduler may delay by hours)
  workflow_dispatch:           # allow manual trigger
  workflow_run:                # also run after every successful production deploy
    workflows: ["Build & Deploy (Production)"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: pages-main       # same group as deploy-prod – prevents gh-pages race
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # When triggered by workflow_run, only proceed if the deploy succeeded
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch wind station data
        run: |
          mkdir deploy
          curl -fsSL -o deploy/wind-speeds.json \
            "https://storage.googleapis.com/trafikkort-data/geojson/wind-speeds.point.json"

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          keep_files: true   # preserve the rest of the site

