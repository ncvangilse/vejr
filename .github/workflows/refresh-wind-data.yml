name: Refresh NinJo station data

on:
  workflow_dispatch:           # triggered by cron-job.org every 15 min via GitHub API
  workflow_run:                # also run after every successful production deploy
    workflows: ["Build & Deploy (Production)"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: pages-main       # same group as deploy-prod – prevents gh-pages race
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # When triggered by workflow_run, only proceed if the deploy succeeded
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch wind station data from Trafikkort
        run: |
          mkdir -p deploy
          curl -fsSL -o deploy/wind-speeds.json \
            "https://storage.googleapis.com/trafikkort-data/geojson/wind-speeds.point.json"

      - name: Fetch NinJo station data from DMI
        run: |
          NINJO_DIRECT='https://www.dmi.dk/NinJo2DmiDk/ninjo2dmidk?cmd=obj&south=54.1&north=57.9&west=5.5&east=17.9'
          NINJO_ENC='https%3A%2F%2Fwww.dmi.dk%2FNinJo2DmiDk%2Fninjo2dmidk%3Fcmd%3Dobj%26south%3D54.1%26north%3D57.9%26west%3D5.5%26east%3D17.9'
          curl -fsSL "$NINJO_DIRECT" -o deploy/ninjo-stations.json \
          || curl -fsSL "https://api.allorigins.win/raw?url=$NINJO_ENC" -o deploy/ninjo-stations.json \
          || curl -fsSL "https://corsproxy.io/?url=$NINJO_ENC"          -o deploy/ninjo-stations.json \
          || echo '{}' > deploy/ninjo-stations.json

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          keep_files: true   # preserve the rest of the site

